name: Fetch Popular YouTube Videos

on:
  schedule:
    # Запускается каждый день в 12:00 UTC (15:00 по МСК)
    - cron: '0 12 * * *'
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch videos and save to JSON
        run: node scripts/fetch-youtube.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit and push if changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: Update popular YouTube videos'
          file_pattern: 'popular_videos.json'